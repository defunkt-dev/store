cleanupUnusedCatalogs: true
linkWorkspacePackages: true
preferWorkspacePackages: true
blockExoticSubdeps: true
trustPolicy: 'no-downgrade'

overrides:
  # Exactly one @marko/compiler in the graph. marko, @marko/vite, @marko/run,
  # and @marko/language-tools (via @marko/type-check) all accept ^5.39/^5.40
  # ranges; letting the lockfile resolve them independently can split versions
  # across entries, and two compiler instances in one process fail every .marko
  # compile with "Unable to access Marko File outside of a compilation".
  '@marko/compiler': 5.39.66

peerDependencyRules:
  allowedVersions:
    '@vue/composition-api>vue': '>= 2.5'

packages:
  - 'packages/**'
  - 'examples/angular/**'
  - 'examples/react/**'
  - 'examples/solid/**'
  - 'examples/vue/**'
  - 'examples/svelte/**'
  - 'examples/preact/**'
  - 'examples/lit/**'
  - 'examples/marko/**'

allowBuilds:
  # root dependency
  nx: true
  unrs-resolver: false # not directly required for build (could enable for better build perf)
  esbuild: true

  # @angular/build
  '@parcel/watcher': false # optional dep of @angular/build
  lmdb: false # optional dep of @angular/build
  msgpackr-extract: false # optional dep of @angular/build

  # @tanstack/vue-store
  vue-demi: true # only required for vue 2 support
